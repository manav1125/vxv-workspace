services:
  - type: web
    name: vxv-workspace-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install ".[agents]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    previews:
      generation: automatic
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: VXV_AUTH_MODE
        value: local
      - key: VXV_UPLOAD_DIR
        value: /tmp/vxv-uploads
      - key: VXV_STORAGE_MODE
        value: local
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-5-sonnet-20241022
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL
        value: qwen-plus
      - key: VXV_OIDC_ISSUER
        sync: false
      - key: VXV_OIDC_AUDIENCE
        sync: false
      - key: VXV_OIDC_JWKS_URL
        sync: false
      - key: VXV_S3_BUCKET
        sync: false
      - key: VXV_S3_PREFIX
        sync: false
      - key: VXV_S3_ENDPOINT_URL
        sync: false
      - key: VXV_S3_PUBLIC_BASE_URL
        sync: false

  - type: web
    name: vxv-workspace-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./apps/web/dist
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
