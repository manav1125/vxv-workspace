services:
  - type: web
    name: vxv-workspace-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install ".[agents]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    previews:
      generation: automatic
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-5-sonnet-20241022
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL
        value: qwen-plus

  - type: web
    name: vxv-workspace-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./apps/web/dist
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
